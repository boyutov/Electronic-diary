<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ученики — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>Electronic Diary</h1>
        <span class="role-badge">Администратор</span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>

<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
            <h2>Ученики</h2>
            <p>Управление учениками школы</p>
        </div>
        <button class="button" id="add-btn">+ Добавить ученика</button>
    </div>

    <div class="card">
        <div class="table-wrap">
            <table id="students-table">
                <thead>
                    <tr>
                        <th>ФИО</th>
                        <th>Email</th>
                        <th>Возраст</th>
                        <th>Класс</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Добавить ученика</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="student-form">
            <input type="hidden" id="student-id">
            <div class="form-group"><label>Имя</label><input id="firstName" placeholder="Имя" required></div>
            <div class="form-group"><label>Фамилия</label><input id="secondName" placeholder="Фамилия" required></div>
            <div class="form-group"><label>Отчество</label><input id="thirdName" placeholder="Отчество"></div>
            <div class="form-group"><label>Email</label><input id="email" type="email" placeholder="student@school.kz" required></div>
            <div class="form-group"><label>Пароль <span id="password-hint" style="font-weight:400;color:#64748b;">(обязателен при создании)</span></label><input id="password" type="password" placeholder="Пароль"></div>
            <div class="form-group"><label>Возраст</label><input id="age" type="number" placeholder="15" min="5" max="25" required></div>
            <div class="form-group"><label>Класс</label><select id="group" required><option disabled selected>Загрузка...</option></select></div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/admin-student.js"></script>
</body>
</html>
