<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
    <style>
        .week-navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .week-navigation h3 { margin: 0; font-size: 1em; }
        .nav-btn {
            background: #fff;
            border: 1.5px solid var(--border);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text);
            font-size: 0.88em;
            font-weight: 500;
        }
        .nav-btn:hover { background: #f1f5f9; }
    </style>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header">
        <h2>Расписание</h2>
        <p>Просмотр и управление расписанием по группам</p>
    </div>

    <div class="card">
        <div class="form-group" style="max-width:300px;">
            <label>Выберите группу</label>
            <select id="group-select"><option disabled selected>Загрузка...</option></select>
        </div>

        <div class="week-navigation">
            <button class="nav-btn" id="prev-week">← Пред. неделя</button>
            <h3 id="current-period">Выберите группу</h3>
            <button class="nav-btn" id="next-week">След. неделя →</button>
        </div>

        <div id="schedule-results">
            <p style="color:#64748b;">Выберите группу для просмотра расписания.</p>
        </div>
    </div>
</div>

<!-- Edit modal -->
<div id="edit-modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Редактировать урок</h3>
            <button class="modal-close" id="edit-modal-close">&times;</button>
        </div>
        <form id="edit-form">
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Предмет</label><select id="edit-discipline" required></select></div>
            <div class="form-group"><label>Учитель</label><select id="edit-teacher" required></select></div>
            <div class="form-group"><label>Группа</label><select id="edit-group" required></select></div>
            <div class="form-group"><label>Дата</label><input type="date" id="edit-date" required></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group"><label>Начало</label><input type="time" id="edit-startTime" required></div>
                <div class="form-group"><label>Конец</label><input type="time" id="edit-endTime" required></div>
            </div>
            <div class="form-group"><label>Номер урока</label><input type="number" id="edit-lessonNumber" required></div>
            <div class="form-group"><label>Кабинет</label><input id="edit-classroom"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/admin-schedule-view.js"></script>
</body>
</html>
