<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель учителя</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Учитель</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header">
        <h2>Добро пожаловать, <span id="teacher-greeting">...</span>!</h2>
    </div>
    <div id="curator-panel" style="display:none;">
        <div class="card" style="margin-bottom:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <h3 style="margin:0;">👥 Панель куратора</h3>
                    <p style="margin-top:4px;color:#64748b;">Вы куратор группы: <strong id="curator-group-name"></strong></p>
                </div>
                <a id="view-my-class-btn" class="button" href="#">Посмотреть класс</a>
            </div>
        </div>
    </div>
    <div class="card" style="margin-bottom:24px;">
        <h3 style="margin-bottom:16px;">📚 Мои группы</h3>
        <div id="groups-container"><p style="color:#64748b;">Загрузка...</p></div>
    </div>
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">📅 Расписание на сегодня</h3>
            <a class="button ghost sm" id="full-schedule-link" href="#">Полное расписание</a>
        </div>
        <div id="schedule-container" class="schedule-grid">
            <p style="color:#64748b;">Загрузка расписания...</p>
        </div>
    </div>
</div>
<div id="mark-modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Выставление оценок</h3>
            <button class="modal-close" id="mark-modal-close">&times;</button>
        </div>
        <p style="margin-bottom:4px;font-size:0.9em;">Предмет: <strong id="mark-modal-discipline"></strong></p>
        <p style="margin-bottom:16px;font-size:0.9em;">Группа: <strong id="mark-modal-group"></strong></p>
        <form id="mark-form">
            <div id="mark-students-container" style="max-height:400px;overflow-y:auto;margin-bottom:16px;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить оценки</button>
        </form>
    </div>
</div>
<script src="/js/sidebar.js"></script>
<script src="/js/teacher.js"></script>
</body>
</html>
