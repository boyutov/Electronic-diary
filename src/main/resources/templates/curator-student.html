<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать ученика — Куратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Куратор</span></div>
    <nav>
        <span class="nav-section">Главное</span>
        <a href="/teacher">🏠 Панель</a>
        <a href="/schedule">📅 Расписание</a>
        <a href="/curator/students-list">👥 Мой класс</a>
        <span class="nav-section">Прочее</span>
        <a href="/profile">👤 Профиль</a>
    </nav>
    <div class="sidebar-footer">
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>

<div class="app-content">
    <div class="page-header">
        <h2>Создать ученика</h2>
        <p>Новый ученик будет добавлен в ваш класс</p>
    </div>

    <div class="card" style="max-width:520px;">
        <div id="success-msg" class="alert-success" style="display:none;"></div>
        <div id="error-msg" class="alert-error" style="display:none;"></div>
        <form id="student-form">
            <div class="form-group"><label>Имя</label><input id="firstName" placeholder="Имя" required></div>
            <div class="form-group"><label>Фамилия</label><input id="secondName" placeholder="Фамилия" required></div>
            <div class="form-group"><label>Отчество</label><input id="thirdName" placeholder="Отчество"></div>
            <div class="form-group"><label>Email</label><input id="email" type="email" placeholder="student@school.kz" required></div>
            <div class="form-group"><label>Пароль</label><input id="password" type="password" placeholder="Пароль" required></div>
            <div class="form-group"><label>Возраст</label><input id="age" type="number" placeholder="15" min="5" max="25" required></div>
            <button class="button" type="submit" style="width:100%;">Создать ученика</button>
        </form>
    </div>
</div>

<script src="/js/curator-student.js"></script>
<script src="/js/navigation.js"></script>
</body>
</html>
