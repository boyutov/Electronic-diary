<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню столовой</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
    <style>
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .menu-card {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .menu-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .menu-card-body { padding: 16px; }
        .menu-card-title { font-weight: 700; font-size: 1em; margin-bottom: 4px; }
        .menu-card-date { font-size: 0.82em; color: #94a3b8; margin-bottom: 8px; }
        .menu-card-desc { font-size: 0.9em; color: #64748b; margin-bottom: 10px; }
        .menu-card-groups { display: flex; flex-wrap: wrap; gap: 4px; }
        .menu-card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .img-placeholder {
            width: 100%; height: 200px;
            background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 3em; color: #cbd5e1;
        }
    </style>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Пользователь</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>

<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
            <h2>🍽️ Меню столовой</h2>
            <p style="color:#64748b;margin-top:4px;">Актуальное меню для вашего класса</p>
        </div>
        <button class="button" id="add-btn" style="display:none;">+ Добавить меню</button>
    </div>
    <div id="menu-container" class="menu-grid">
        <p style="color:#64748b;">Загрузка...</p>
    </div>
</div>

<!-- Модал создания/редактирования -->
<div id="modal" class="modal">
    <div class="modal-box" style="max-width:560px;">
        <div class="modal-header">
            <h3 id="modal-title">Добавить меню</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="menu-form">
            <input type="hidden" id="menu-id">
            <div class="form-group"><label>Заголовок</label><input id="title" placeholder="Меню на понедельник" required></div>
            <div class="form-group"><label>Описание</label><textarea id="description" placeholder="Суп, второе, компот..."></textarea></div>
            <div class="form-group"><label>Дата</label><input type="date" id="menuDate" required></div>
            <div class="form-group">
                <label>Фото меню</label>
                <input type="file" id="imageFile" accept="image/*" style="padding:6px;">
                <div id="image-preview" style="margin-top:8px;display:none;">
                    <img id="preview-img" style="max-width:100%;max-height:200px;border-radius:8px;">
                </div>
            </div>
            <div class="form-group">
                <label>Классы (оставьте пустым — для всех)</label>
                <div id="groups-container" style="max-height:150px;overflow-y:auto;border:1.5px solid #e2e8f0;padding:10px;border-radius:8px;">
                    <p style="color:#64748b;font-size:0.9em;">Загрузка...</p>
                </div>
            </div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/canteen.js"></script>
</body>
</html>
