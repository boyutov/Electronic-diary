<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосования — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><h2>Голосования</h2><p>Управление опросами и голосованиями</p></div>
        <button class="button" id="add-btn">+ Создать голосование</button>
    </div>
    <div class="card">
        <div class="table-wrap">
            <table id="polls-table">
                <thead><tr><th>Заголовок</th><th class="col-center">Статус</th><th class="col-center">Голосов</th><th>Доступно</th><th>Дата</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Создать голосование</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="poll-form">
            <input type="hidden" id="poll-id">
            <div class="form-group"><label>Заголовок</label><input id="title" placeholder="Выберите дату собрания" required></div>
            <div class="form-group"><label>Описание</label><textarea id="description" placeholder="Краткое описание"></textarea></div>
            <div class="form-group"><label>Варианты (через запятую)</label><input id="options" placeholder="5 мая, 7 мая" required></div>
            <div class="form-group">
                <label>Кто может голосовать</label>
                <div style="display:flex;flex-wrap:wrap;gap:12px;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;">
                    <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="checkbox" id="role-STUDENT"> Ученики</label>
                    <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="checkbox" id="role-TEACHER"> Учителя</label>
                    <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="checkbox" id="role-PARENT"> Родители</label>
                    <label style="display:flex;align-items:center;gap:6px;font-weight:400;"><input type="checkbox" id="role-DIRECTOR"> Директора</label>
                </div>
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="active">
                    <option value="yes" selected>Активно</option>
                    <option value="no">Закрыто</option>
                </select>
            </div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/admin-poll.js"></script>

<!-- Модал статистики -->
<div id="stats-modal" class="modal">
    <div class="modal-box" style="max-width:560px;">
        <div class="modal-header">
            <h3 id="stats-modal-title">Результаты</h3>
            <button class="modal-close" id="stats-modal-close">&times;</button>
        </div>
        <div id="stats-modal-body"></div>
    </div>
</div>
</body>
</html>
