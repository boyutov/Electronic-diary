<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новости — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><h2>Новости</h2><p>Публикация и управление новостями школы</p></div>
        <button class="button" id="add-btn">+ Опубликовать новость</button>
    </div>
    <div class="card">
        <div class="table-wrap">
            <table id="news-table">
                <thead><tr><th>Заголовок</th><th>Дата</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Опубликовать новость</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="news-form">
            <input type="hidden" id="news-id">
            <div class="form-group"><label>Заголовок</label><input id="title" placeholder="Новая неделя" required></div>
            <div class="form-group"><label>Текст</label><textarea id="text" placeholder="Описание новости" required></textarea></div>
            <div class="form-group">
                <label>Автор (учитель, опционально)</label>
                <select id="teacher"><option value="">Без учителя</option></select>
            </div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/admin-news.js"></script>
</body>
</html>
