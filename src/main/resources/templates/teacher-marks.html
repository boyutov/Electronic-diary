<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки — Учитель</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
    <style>
        .mark-chip {
            display:inline-flex; align-items:center; gap:4px;
            padding:4px 10px; border-radius:8px; font-size:0.88em; font-weight:600;
            cursor:pointer; transition:opacity 0.15s;
        }
        .mark-chip:hover { opacity:0.8; }
        .mark-chip .chip-actions { display:none; gap:4px; }
        .mark-chip:hover .chip-actions { display:flex; }
    </style>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Учитель</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer"><button id="logout-btn">🚪 Выйти</button></div>
</aside>

<div class="app-content">
    <div class="page-header">
        <h2>📊 Журнал оценок</h2>
        <p style="color:#64748b;margin-top:4px;">Просмотр, изменение и удаление оценок по вашим предметам</p>
    </div>

    <!-- Фильтры -->
    <div class="card" style="margin-bottom:24px;">
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
            <div class="form-group" style="margin:0;min-width:160px;">
                <label>Группа</label>
                <select id="group-select"><option disabled selected>Выберите группу</option></select>
            </div>
            <div class="form-group" style="margin:0;min-width:160px;">
                <label>Предмет</label>
                <select id="discipline-select"><option disabled selected>Выберите предмет</option></select>
            </div>
            <button class="button" id="load-btn">Загрузить</button>
        </div>
    </div>

    <div id="marks-content"></div>
</div>

<!-- Модал: новая оценка -->
<div id="add-mark-modal" class="modal">
    <div class="modal-box" style="max-width:460px;">
        <div class="modal-header">
            <h3 id="add-mark-title">Поставить оценку</h3>
            <button class="modal-close" id="add-mark-close">&times;</button>
        </div>
        <div class="form-group">
            <label>Оценка <span style="color:#ef4444;">*</span></label>
            <input type="number" id="add-mark-value" min="1" max="100" placeholder="1–100" style="max-width:120px;">
        </div>
        <div class="form-group">
            <label>Дата оценки</label>
            <input type="date" id="add-mark-date">
            <p id="add-mark-date-hint" style="font-size:0.82em;margin-top:4px;display:none;"></p>
        </div>
        <div class="form-group">
            <label id="add-mark-comment-label">Комментарий</label>
            <textarea id="add-mark-comment" placeholder="Комментарий к оценке..." rows="3"></textarea>
        </div>
        <div id="add-mark-error" class="alert-error" style="display:none;"></div>
        <div style="display:flex;gap:8px;">
            <button class="button" id="add-mark-confirm" style="flex:1;">Сохранить</button>
            <button class="button ghost" id="add-mark-cancel" style="flex:1;">Отмена</button>
        </div>
    </div>
</div>

<!-- Модал: изменить/удалить оценку -->
<div id="reason-modal" class="modal">
    <div class="modal-box" style="max-width:460px;">
        <div class="modal-header">
            <h3 id="reason-modal-title">Изменить оценку</h3>
            <button class="modal-close" id="reason-modal-close">&times;</button>
        </div>
        <div id="reason-modal-body">
            <div id="new-value-group" class="form-group">
                <label>Новая оценка</label>
                <input type="number" id="new-value" min="1" max="100" style="max-width:120px;">
            </div>
            <div class="form-group">
                <label>Причина <span style="color:#ef4444;">*</span></label>
                <textarea id="reason-input" placeholder="Обязательно укажите причину изменения/удаления..." rows="3" required></textarea>
                <p style="font-size:0.82em;color:#94a3b8;margin-top:4px;">Без причины сохранение невозможно</p>
            </div>
            <div id="reason-error" class="alert-error" style="display:none;"></div>
            <div style="display:flex;gap:8px;">
                <button class="button" id="reason-confirm-btn" style="flex:1;">Подтвердить</button>
                <button class="button ghost" id="reason-cancel-btn" style="flex:1;">Отмена</button>
            </div>
        </div>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/teacher-marks.js"></script>
</body>
</html>
