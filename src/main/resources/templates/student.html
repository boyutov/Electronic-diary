<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель ученика</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Ученик</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header">
        <h2 id="student-greeting">Добро пожаловать!</h2>
        <p id="student-info" style="color:#64748b;margin-top:4px;">Загрузка...</p>
    </div>
    <div class="card" style="margin-bottom:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">📅 Расписание на сегодня</h3>
            <a class="button ghost sm" id="full-schedule-link" href="#">Полное расписание</a>
        </div>
        <div id="schedule-container" class="schedule-grid">
            <p style="color:#64748b;">Загрузка...</p>
        </div>
    </div>
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="margin:0;">📊 Мои оценки</h3>
            <span id="marks-overall" style="font-size:0.9em;color:#64748b;"></span>
        </div>
        <div id="marks-container">
            <p style="color:#64748b;">Загрузка оценок...</p>
        </div>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/student.js"></script>
</body>
</html>
