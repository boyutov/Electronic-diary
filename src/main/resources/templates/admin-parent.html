<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Родители — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><h2>Родители</h2><p>Управление родителями учеников</p></div>
        <button class="button" id="add-btn">+ Добавить родителя</button>
    </div>
    <div class="card">
        <div class="table-wrap">
            <table id="parents-table">
                <thead><tr><th>ФИО</th><th>Email</th><th>Телефон</th><th>Дети</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Добавить родителя</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="parent-form">
            <input type="hidden" id="parent-id">
            <div class="form-group"><label>Имя</label><input id="firstName" placeholder="Имя" required></div>
            <div class="form-group"><label>Фамилия</label><input id="secondName" placeholder="Фамилия" required></div>
            <div class="form-group"><label>Отчество</label><input id="thirdName" placeholder="Отчество"></div>
            <div class="form-group"><label>Email</label><input id="email" type="email" placeholder="parent@school.kz" required></div>
            <div class="form-group"><label>Пароль</label><input id="password" type="password" placeholder="Пароль"></div>
            <div class="form-group"><label>Телефон</label><input id="phone" type="tel" placeholder="+7 700 000 00 00"></div>
            <div class="form-group">
                <label>Дети (ученики)</label>
                <div id="students-container" style="max-height:160px;overflow-y:auto;border:1.5px solid #e2e8f0;padding:10px;border-radius:8px;background:#fff;">
                    <p style="color:#64748b;font-size:0.9em;">Загрузка...</p>
                </div>
            </div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/admin-parent.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
