<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учителя — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><h2>Учителя</h2><p>Управление преподавателями школы</p></div>
        <button class="button" id="add-btn">+ Добавить учителя</button>
    </div>
    <div class="card">
        <div class="table-wrap">
            <table id="teachers-table">
                <thead><tr><th>ФИО</th><th>Email</th><th>Телефон</th><th>Группа</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Добавить учителя</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="teacher-form">
            <input type="hidden" id="teacher-id">
            <div class="form-group"><label>Имя</label><input id="firstName" placeholder="Имя" required></div>
            <div class="form-group"><label>Фамилия</label><input id="secondName" placeholder="Фамилия" required></div>
            <div class="form-group"><label>Отчество</label><input id="thirdName" placeholder="Отчество"></div>
            <div class="form-group"><label>Email</label><input id="email" type="email" placeholder="teacher@school.kz" required></div>
            <div class="form-group"><label>Пароль</label><input id="password" type="password" placeholder="Пароль"></div>
            <div class="form-group"><label>Телефон</label><input id="phone" type="tel" placeholder="+7 700 000 00 00"></div>
            <div class="form-group"><label>Био</label><textarea id="bio" placeholder="Краткая информация"></textarea></div>
            <div class="form-group">
                <label>Предметы</label>
                <div id="disciplines-container" style="max-height:150px;overflow-y:auto;border:1.5px solid #e2e8f0;padding:10px;border-radius:8px;background:#fff;">
                    <p style="color:#64748b;font-size:0.9em;">Загрузка...</p>
                </div>
            </div>
            <div class="form-group">
                <label>Есть кабинет</label>
                <select id="hasOffice">
                    <option value="no" selected>Нет</option>
                    <option value="yes">Да</option>
                </select>
            </div>
            <div class="form-group" id="teacher-office" style="display:none;">
                <label>Кабинет</label><input id="office" placeholder="101">
            </div>
            <div class="form-group">
                <label>Есть группа</label>
                <select id="hasGroup">
                    <option value="no" selected>Нет</option>
                    <option value="yes">Да</option>
                </select>
            </div>
            <div class="form-group" id="teacher-group" style="display:none;">
                <label>Группа</label>
                <select id="group"><option disabled selected>Загрузка...</option></select>
            </div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/admin-teacher.js"></script>
</body>
</html>
