<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
    <style>
        .week-navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .week-navigation h3 { margin: 0; font-size: 1em; }
        .nav-btn {
            background: #fff;
            border: 1.5px solid var(--border);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88em;
            font-weight: 500;
        }
        .nav-btn:hover { background: #f1f5f9; }
    </style>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge" id="sidebar-role">Расписание</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>

<div class="app-content">
    <div class="page-header">
        <h2>Расписание занятий</h2>
        <p>Ваше расписание на неделю</p>
    </div>

    <div class="card">
        <div class="week-navigation">
            <button class="nav-btn" id="prev-week">← Пред. неделя</button>
            <h3 id="current-period">Загрузка...</h3>
            <button class="nav-btn" id="next-week">След. неделя →</button>
        </div>
        <div id="schedule-results">
            <p style="color:#64748b;">Загрузка расписания...</p>
        </div>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/schedule-view.js"></script>
</body>
</html>
