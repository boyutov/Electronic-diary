<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки оценивания</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer"><button id="logout-btn">🚪 Выйти</button></div>
</aside>

<div class="app-content">
    <div class="page-header">
        <h2>📊 Настройки оценивания</h2>
        <p style="color:#64748b;margin-top:4px;">Выберите систему периодов для отображения оценок</p>
    </div>

    <div class="card" style="max-width:560px;">
        <div id="success-msg" class="alert-success" style="display:none;">Настройки сохранены!</div>

        <form id="grading-form">
            <div class="form-group">
                <label>Тип периода оценивания</label>
                <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px;">
                    <label style="display:flex;align-items:flex-start;gap:12px;padding:16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;" id="opt-quarter">
                        <input type="radio" name="periodType" value="QUARTER" style="width:auto;margin-top:3px;">
                        <div>
                            <div style="font-weight:600;">📅 Четверти</div>
                            <div style="color:#64748b;font-size:0.88em;margin-top:2px;">4 четверти в учебном году. Средняя оценка считается за каждую четверть (~2 месяца).</div>
                        </div>
                    </label>
                    <label style="display:flex;align-items:flex-start;gap:12px;padding:16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;" id="opt-semester">
                        <input type="radio" name="periodType" value="SEMESTER" style="width:auto;margin-top:3px;">
                        <div>
                            <div style="font-weight:600;">📆 Полугодия</div>
                            <div style="color:#64748b;font-size:0.88em;margin-top:2px;">2 полугодия. Средняя оценка считается за каждое полугодие (~4-5 месяцев).</div>
                        </div>
                    </label>
                    <label style="display:flex;align-items:flex-start;gap:12px;padding:16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;" id="opt-year">
                        <input type="radio" name="periodType" value="YEAR" style="width:auto;margin-top:3px;">
                        <div>
                            <div style="font-weight:600;">🗓️ Годовые</div>
                            <div style="color:#64748b;font-size:0.88em;margin-top:2px;">Одна итоговая оценка за весь учебный год.</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Начало учебного года (месяц)</label>
                <select id="academicYearStart" style="max-width:200px;">
                    <option value="9">Сентябрь</option>
                    <option value="8">Август</option>
                    <option value="10">Октябрь</option>
                </select>
            </div>

            <button class="button" type="submit" style="width:100%;">Сохранить настройки</button>
        </form>
    </div>

    <!-- Предпросмотр периодов -->
    <div class="card" style="max-width:560px;margin-top:0;">
        <h3 style="margin-bottom:16px;">Предпросмотр периодов</h3>
        <div id="periods-preview"></div>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const schoolName = sessionStorage.getItem("schoolName") || window.location.pathname.split('/')[1];

    // Загружаем текущие настройки
    apiFetch(`/api/${schoolName}/grading/settings`)
        .then(r => r.ok ? r.json() : { periodType: "QUARTER", academicYearStart: 9 })
        .then(s => {
            document.querySelector(`input[value="${s.periodType}"]`).checked = true;
            document.getElementById("academicYearStart").value = s.academicYearStart;
            highlightSelected(s.periodType);
            updatePreview(s.periodType, s.academicYearStart);
        });

    // Подсветка выбранного варианта
    function highlightSelected(val) {
        ["QUARTER","SEMESTER","YEAR"].forEach(v => {
            const el = document.getElementById("opt-" + v.toLowerCase());
            if (el) el.style.borderColor = v === val ? "var(--primary)" : "var(--border)";
        });
    }

    document.querySelectorAll("input[name='periodType']").forEach(r => {
        r.addEventListener("change", () => {
            highlightSelected(r.value);
            updatePreview(r.value, parseInt(document.getElementById("academicYearStart").value));
        });
    });
    document.getElementById("academicYearStart").addEventListener("change", function() {
        const pt = document.querySelector("input[name='periodType']:checked")?.value || "QUARTER";
        updatePreview(pt, parseInt(this.value));
    });

    function updatePreview(periodType, yearStart) {
        const MONTHS = ["","Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
        const today = new Date();
        const year = today.getMonth() + 1 >= yearStart ? today.getFullYear() : today.getFullYear() - 1;

        let periods = [];
        if (periodType === "YEAR") {
            const em = yearStart === 1 ? 12 : yearStart - 1;
            periods = [{ name: "Учебный год", from: `${MONTHS[yearStart]} ${year}`, to: `${MONTHS[em]} ${year+1}` }];
        } else if (periodType === "SEMESTER") {
            const mid = yearStart + 3;
            const m1 = ((mid-1)%12)+1, m2 = ((mid)%12)+1;
            const em = yearStart === 1 ? 12 : yearStart - 1;
            periods = [
                { name: "1 полугодие", from: `${MONTHS[yearStart]} ${year}`, to: `${MONTHS[m1]} ${year}` },
                { name: "2 полугодие", from: `${MONTHS[m2]} ${year+1}`, to: `${MONTHS[em]} ${year+1}` }
            ];
        } else {
            const names = ["1 четверть","2 четверть","3 четверть","4 четверть"];
            for (let i = 0; i < 4; i++) {
                const sm = ((yearStart + i*2 - 1) % 12) + 1;
                const em = ((yearStart + i*2 + 1 - 1) % 12) + 1;
                const sy = year + (yearStart + i*2 > 12 ? 1 : 0);
                const ey = year + (yearStart + i*2 + 1 > 12 ? 1 : 0);
                periods.push({ name: names[i], from: `${MONTHS[sm]} ${sy}`, to: `${MONTHS[em]} ${ey}` });
            }
        }

        document.getElementById("periods-preview").innerHTML = periods.map((p, i) => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
                <span class="badge blue" style="min-width:100px;text-align:center;">${p.name}</span>
                <span style="color:#64748b;font-size:0.9em;">${p.from} — ${p.to}</span>
            </div>
        `).join("");
    }

    document.getElementById("grading-form").addEventListener("submit", e => {
        e.preventDefault();
        const periodType = document.querySelector("input[name='periodType']:checked")?.value;
        const yearStart = parseInt(document.getElementById("academicYearStart").value);
        apiFetch(`/api/${schoolName}/grading/settings`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ periodType, academicYearStart: yearStart })
        }).then(r => {
            if (r.ok) {
                const msg = document.getElementById("success-msg");
                msg.style.display = "block";
                setTimeout(() => msg.style.display = "none", 3000);
            }
        });
    });
});
</script>
</body>
</html>
