<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Курсы — Администратор</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
</head>
<body class="app-layout">
<aside class="sidebar">
    <div class="sidebar-brand"><h1>Electronic Diary</h1><span class="role-badge">Администратор</span></div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <a href="/profile">👤 Личный кабинет</a>
        <button id="logout-btn">🚪 Выйти</button>
    </div>
</aside>
<div class="app-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><h2>Курсы</h2><p>Управление учебными курсами</p></div>
        <button class="button" id="add-btn">+ Добавить курс</button>
    </div>
    <div class="card">
        <div class="table-wrap">
            <table id="courses-table">
                <thead><tr><th>Название</th><th>Учитель</th><th>Описание</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Добавить курс</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="course-form">
            <input type="hidden" id="course-id">
            <div class="form-group"><label>Название курса</label><input id="name" placeholder="Подготовка к ЕНТ" required></div>
            <div class="form-group">
                <label>Учитель</label>
                <select id="teacher" required><option disabled selected>Загрузка...</option></select>
            </div>
            <div class="form-group"><label>Описание</label><textarea id="description" placeholder="Краткое описание"></textarea></div>
            <div id="form-error" class="alert-error" style="display:none;"></div>
            <button class="button" type="submit" style="width:100%;">Сохранить</button>
        </form>
    </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/admin-course.js"></script>
</body>
</html>
