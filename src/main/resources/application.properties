spring.application.name=school management system
server.port=8088

# === Connecting to PostgresSQL in Docker ===
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5434/school_management_db
spring.datasource.username=developer
spring.datasource.password=${DB_PASSWORD}

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=true
spring.flyway.validate-on-migrate=false

# === Session Configuration ===
server.servlet.session.timeout=3600s
server.servlet.session.cookie.max-age=-1

# === Jackson ===
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# === Logging ===
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB